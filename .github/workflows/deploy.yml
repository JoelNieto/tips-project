name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  migrate:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
       github.event.workflow_run.head_branch == 'staging')
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --no-cache

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ github.event.workflow_run.head_branch == 'main' && secrets.DATABASE_URL_PRODUCTION || secrets.DATABASE_URL_STAGING }}
        run: bunx prisma migrate deploy

  smoke:
    needs: migrate
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    steps:
      - name: Health check (web-app)
        env:
          BASE_URL: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PRODUCTION_URL || secrets.STAGING_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL secret not set; skipping smoke tests."
            exit 0
          fi
          curl -fsS "$BASE_URL/health"
          curl -fsS "$BASE_URL/api/health"
